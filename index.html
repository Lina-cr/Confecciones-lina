<!DOCTYPE html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONFECCIONES LINA| Tienda de Ropa</title>
    <meta
      name="description"
      content="Tienda de ropa moderna con catálogo, pedidos en línea, favoritos y pagos digitales."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="navbar container">
        <div class="nav-links">
          <a href="#catalogo">Catálogo</a>
        </div>
        <div class="nav-actions">
          <a class="brand" href="#catalogo"><span class="brand-text">Confecciones Lina</span><img src="WhatsApp Image 2026-07-14 at 6.06.58 PM (8).jpeg" alt="Confecciones Lina logo" class="brand-logo"></a>
        </div>
      </nav>
    </header>

    <main>
      <section id="catalogo" class="section container">
        <div class="section-head">
          <div>
            <p class="eyebrow">Catálogo con precios</p>
            <h2>Encuentra tu próxima prenda favorita</h2>
          </div>
          <div class="controls">
            <input id="searchInput" type="search" placeholder="Buscar prendas..." />
            <button id="favoritesToggle" class="secondary-btn">Mostrar favoritos</button>
          </div>
        </div>

        <div id="productGrid" class="product-grid"></div>
      </section>
    </main>

    <div class="bottom-actions container">
      <button id="themeToggle" class="icon-btn" aria-label="Cambiar tema">🌙</button>
      <a id="cartBtn" class="cart-btn" href="cart.html">🛒 <span id="cartCount">0</span></a>
    </div>
    <script src="script.js"></script>
  </body>
</html>
