<!DOCTYPE html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito | Confecciones Lina</title>
    <meta
      name="description"
      content="Revisa y confirma tu carrito de compras en Confecciones Lina."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="navbar container">
        <div class="nav-links">
          <a href="index.html#catalogo">Catálogo</a>
          <a href="cart.html">Carrito</a>
        </div>
        <div class="nav-actions">
          <a class="brand" href="index.html"><span class="brand-text">Confecciones Lina</span><img src="WhatsApp Image 2026-07-14 at 6.06.58 PM (8).jpeg" alt="Confecciones Lina logo" class="brand-logo"></a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section container" id="cartPage">
        <div class="section-head">
          <div>
            <p class="eyebrow">Carrito</p>
            <h2>Revisa tus productos antes de encargar</h2>
          </div>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
          <strong>Total: <span id="cartTotal">$0</span></strong>
          <button id="checkoutBtn" class="primary-btn">Encargar ahora</button>
        </div>
      </section>
    </main>

    <!-- Login modal removed: checkout no longer requires authentication -->
    <div class="bottom-actions container">
      <button id="themeToggle" class="icon-btn" aria-label="Cambiar tema">🌙</button>
      <a id="cartBtn" class="cart-btn" href="cart.html">🛒 <span id="cartCount">0</span></a>
    </div>
    <script src="script.js"></script>
  </body>
</html>
